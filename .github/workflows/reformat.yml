name: documentation

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  checks:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
  gh-release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/checkout@v2
        with:
          repository: qnimble/quarto-examples
          path: MyExamples
          ref: main
          ssh-key: ${{secrets.SSH_DEPLOY_KEY}}
      - name: push to examples
        env:
          USE_SSH: true
          GIT_USER: git
          DEPLOYMENT_BRANCH: main
        run: |
          git config --global user.email "actions@gihub.com"
          git config --global user.name "gh-actions"
          ls
          ls ~
          ls MyExamples
          ls ${{GITHUB_WORKSPACE}}
          #git clone git@github.com:qnimble/quarto-examples.git /tmp/examples
          #cd /tmp/examples
          find -maxdepth 3  -mindepth 3 -type d -path '*examples*' -execdir mv '{}' ../ \;           
          rm LICENSE
          cp -ra * ${{MyExamples
          cd MyExamples
          git add -u
          git commit -m "Autocommit"
          git push
          
              
