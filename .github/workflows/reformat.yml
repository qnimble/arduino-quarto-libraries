name: documentation

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  checks:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
  gh-release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          path: Source
      - uses: actions/checkout@v2
        with:
          repository: qnimble/quarto-examples
          path: MyExamplesBad
          ref: main
          ssh-key: ${{secrets.DEPLOY_SSH_KEY}}
      - name: Push to Examples Repo
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
          USE_SSH: true
          GIT_USER: git
          DEPLOYMENT_BRANCH: main
          KEY_SECRET: ${{secrets.DEPLOY_SSH_KEY}}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          echo "$KEY_SECRET" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat <<EOT >> ~/.ssh/config
          Host github.com
          HostName github.com
          IdentityFile ~/.ssh/id_rsa
          EOT
          
          git config --global user.email "actions@gihub.com"
          git config --global user.name "gh-actions"
          echo "Got here"
          cat ~/.ssh/id_rsa|head -n 1
          ls
          
          
          echo "Got here 32"
          ls ~
          echo "pwd"
          pwd
          echo "Got here 44"        
          #echo ls ${{env.GITHUB_WORKSPACE}}
          git clone --verbose git@github.com:qnimble/quarto-examples.git MyExamples
          #cd /tmp/examples
          ls MyExamples
          echo "Got here 55"
          echo cd ${{env.GITHUB_WORKSPACE}}/Source
          cd Source
          echo "After CD"
          find -maxdepth 3  -mindepth 3 -type d -path '*examples*' -execdir mv '{}' ../ \;           
          rm LICENSE
          echo cp -ra * ../MyExamples
          cp -ra * ../MyExamples
          cd ../MyExamples
          pwd
          ls
          git status
          git add -A
          echo "did add"
          git status
          git commit -m "Autocommit"
          git remote set-url origin git@github.com:qnimble/quarto-examples.git
          git remote -v
          echo "Git commit done"
          git push --verbose
          
              
